<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>RBMI Admission Hub</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1e3a8a" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script>
    window.renderIcons = function() {}; // placeholder until module loads
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;font-family:'Inter',sans-serif;background:#f1f5f9;color:#0f172a}

    /* BOOT - 3D Loading Screen */
    #boot{
      position:fixed;inset:0;z-index:99999;
      background:radial-gradient(ellipse at 30% 20%,#1e40af 0%,#1e3a8a 40%,#312e81 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
      perspective:1000px;transition:opacity 0.4s ease;
    }
    .b-logo-wrap{
      animation:float3d 3s ease-in-out infinite;
      transform-style:preserve-3d;
      width:120px;height:120px;
    }
    .b-logo{
      width:120px;height:120px;
      border-radius:50%;overflow:hidden;
      border:3px solid rgba(255,255,255,0.4);
      display:flex;align-items:center;justify-content:center;
      animation:rotate3d 4s linear infinite;
      transform-style:preserve-3d;
      box-shadow:
        0 20px 60px rgba(15,23,42,0.4),
        0 0 40px rgba(20,184,166,0.3),
        inset 0 0 20px rgba(255,255,255,0.1);
      background:transparent;
      padding:0;
    }
    .b-logo img{
      width:80%;height:80%;object-fit:contain;
      border-radius:50%;
      filter:brightness(1.08) contrast(1.05);
      background:transparent !important;
      margin:0;
      /* Removed scale to prevent cutting */
    }
    .b-logo-glow{
      position:absolute;width:120px;height:120px;
      background:radial-gradient(circle,rgba(20,184,166,0.3) 0%,transparent 70%);
      filter:blur(20px);animation:pulse 2s ease-in-out infinite;
    }
    /* SIDEBAR & LOGIN LOGO */
    .sidebar-logo{
      display:flex !important;
      align-items:center !important;
      gap:14px !important;
      margin-bottom:20px !important;
    }
    .sidebar-logo .logo-icon{
      background:transparent !important;
      border:none !important;
      padding:0 !important;
      display:flex !important;
      align-items:center !important;
      justify-content:center !important;
      width:52px !important;
      height:52px !important;
      flex-shrink:0 !important;
    }
    .sidebar-logo .logo-icon img{
      width:100% !important;height:100% !important;
      border-radius:50% !important;
      object-fit:contain !important;
      background:transparent !important;
    }
    .lp-brand > img, .lp-card-logo > img, .lp-brand > div > img{
      background:transparent !important;
      border-radius:50% !important;
      object-fit:contain !important;
      display:block;
      mix-blend-mode:multiply;
    }
    /* BOOT LOGO CLEANED UP */
    @keyframes float3d{
      0%,100%{transform:translateY(0px) rotateX(0deg)}
      50%{transform:translateY(-15px) rotateX(5deg)}
    }
    @keyframes rotate3d{
      0%{transform:rotateY(0deg)}
      100%{transform:rotateY(360deg)}
    }
    .b-logo-glow{
      position:absolute;width:120px;height:120px;
      background:radial-gradient(circle,rgba(20,184,166,0.3) 0%,transparent 70%);
      filter:blur(20px);animation:pulse 2s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{opacity:0.5;transform:scale(1)}
      50%{opacity:1;transform:scale(1.2)}
    }
    .b-title{
      font-size:28px;font-weight:800;color:#fff;margin-bottom:6px;
      text-shadow:0 4px 20px rgba(15,23,42,0.5);
      animation:fadeSlideUp 0.6s ease-out;
    }
    .b-sub{
      font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:40px;
      animation:fadeSlideUp 0.6s ease-out 0.1s both;
    }
    @keyframes fadeSlideUp{
      from{opacity:0;transform:translateY(10px)}
      to{opacity:1;transform:translateY(0)}
    }
    .b-track{
      width:200px;height:6px;
      background:rgba(255,255,255,0.1);
      border-radius:99px;overflow:hidden;margin-bottom:12px;
      box-shadow:inset 0 2px 4px rgba(0,0,0,0.2);
      animation:fadeSlideUp 0.6s ease-out 0.2s both;
    }
    .b-fill{
      height:100%;width:0;
      background:linear-gradient(90deg,#14b8a6,#a5b4fc,#6366f1);
      border-radius:99px;
      transition:width 0.4s cubic-bezier(0.4,0,0.2,1);
      box-shadow:0 0 10px rgba(165,180,252,0.5);
    }
    .b-msg{
      font-size:12px;color:rgba(255,255,255,0.5);
      animation:fadeSlideUp 0.6s ease-out 0.3s both;
    }

    /* APP */
    #app{display:none;position:fixed;inset:0;flex-direction:row;overflow:hidden}
    #app.show{display:flex}
    #sidebar{width:260px;min-width:260px;height:100vh;background:#0f172a;display:flex;flex-direction:column;overflow:hidden}
    #main-wrapper{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;background:#f1f5f9}
    #top-header{height:64px;min-height:64px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
    #page-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px}

    /* LOGIN */
    #login-root{display:none;position:fixed;inset:0;z-index:9998;background:#fff}
    #login-root.show{display:flex}
    .lp{display:flex;width:100%;height:100vh}
    .lp-left{flex:1;background:linear-gradient(160deg,#042f2e,#0f766e,#1d4ed8);display:flex;flex-direction:column;justify-content:space-between;padding:48px;color:#fff;overflow:hidden}
    .lp-brand{display:flex;align-items:center;gap:14px}
    .lp-logo{width:44px;height:44px;background:linear-gradient(135deg,#14b8a6,#2563eb);border:1px solid rgba(255,255,255,0.25);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;box-shadow:0 14px 32px rgba(15,23,42,.18)}
    .lp-brand-name{font-size:20px;font-weight:800}
    .lp-brand-sub{font-size:11px;opacity:0.6;margin-top:2px}
    .lp-hero h1{font-size:40px;font-weight:800;line-height:1.15;margin-bottom:14px;letter-spacing:-1px}
    .lp-hero p{font-size:15px;opacity:0.7;line-height:1.7;margin-bottom:32px;max-width:380px}
    .lp-stats{display:flex;gap:32px;margin-bottom:28px}
    .lp-stat{display:flex;flex-direction:column;gap:2px}
    .ls-n{font-size:28px;font-weight:800}
    .ls-l{font-size:12px;opacity:0.55}
    .lp-branches{display:flex;flex-direction:column;gap:10px}
    .lp-branch{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:12px 16px;font-size:13px}
    .lp-branch strong{display:block;font-weight:600}
    /* Sidebar submenu styles */
    .sidebar-nav{display:flex;flex-direction:column;gap:4px;padding:8px}
    .sidebar-nav .nav-item{display:flex;align-items:center;gap:12px;padding:10px;border-radius:6px;color:#cbd5e1;text-decoration:none}
    .sidebar-nav .nav-item.has-children{display:block}
    .sidebar-nav .nav-item.has-children .nav-main{display:flex;align-items:center;gap:12px;padding:10px;border-radius:6px;color:#cbd5e1;text-decoration:none}
    .sidebar-nav .nav-item.active,.sidebar-nav .nav-subitem.active{background:linear-gradient(90deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01));color:#fff}
    .sidebar-nav .nav-item .nav-caret{transition:transform 0.18s ease}
    .sidebar-nav .has-children .submenu{display:none;flex-direction:column;margin-left:34px;margin-top:6px}
    .sidebar-nav .has-children.expanded .submenu{display:flex}
    .sidebar-nav .has-children.expanded .nav-caret{transform:rotate(180deg)}
    .sidebar-nav .nav-subitem{display:flex;align-items:center;padding:8px 10px;border-radius:6px;color:#94a3b8;text-decoration:none;font-size:14px}
    .sidebar-nav .nav-subitem:hover{background:rgba(255,255,255,0.02);color:#fff}
      .sidebar .logo-icon img{
        width:64px !important;
        height:64px !important;
        object-fit:contain;
        transform:scale(1.06);
        filter:brightness(1.02);
      }
    .lp-form{display:flex;flex-direction:column;gap:16px}
    .lp-group{display:flex;flex-direction:column;gap:6px}
    .lp-group label{font-size:13px;font-weight:600;color:#374151}
    .lp-input{padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;color:#0f172a;background:#f8fafc;outline:none;font-family:inherit;width:100%;transition:border-color 0.15s}
    .lp-input:focus{border-color:#6366f1;background:#fff;box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
    .lp-btn{padding:12px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.15s;margin-top:4px}
    .lp-btn:hover{background:#4f46e5}
    .lp-btn:disabled{opacity:0.6;cursor:not-allowed}
    .lp-div{display:flex;align-items:center;gap:10px;margin:20px 0 14px;color:#94a3b8;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
    .lp-div::before,.lp-div::after{content:'';flex:1;height:1px;background:#e2e8f0}
    .lp-demos{display:flex;flex-direction:column;gap:8px}
    .lp-demo{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;font-family:inherit;text-align:left;width:100%;transition:border-color 0.15s}
    .lp-demo:hover{border-color:#6366f1;background:#f5f3ff}
    .lp-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;white-space:nowrap}
    .lp-badge.admin{background:#ede9fe;color:#7c3aed}
    .lp-badge.counselor{background:#dcfce7;color:#16a34a}
    .lp-demo-name{font-weight:600;font-size:13px;color:#0f172a}
    .lp-demo-email{font-size:11px;color:#64748b}
  </style>
</head>
<body>

<!-- BOOT SCREEN -->
<div id="boot">
  <div style="display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:20px;">
    <div class="b-logo-wrap">
      <div class="b-logo-glow"></div>
      <div class="b-logo">
        <img src="/logo.png" alt="RBMI Logo" />
      </div>
    </div>
    <div style="text-align:center;">
      <div class="b-title">RBMI Admission Hub</div>
      <div class="b-sub">Rakshpal Bahadur Management Institute</div>
    </div>
  </div>
  <div class="b-track"><div class="b-fill" id="bfill"></div></div>
  <div class="b-msg" id="bmsg">Loading...</div>
</div>

<!-- MAIN APP -->
<div id="app">
  <aside id="sidebar"></aside>
  <main id="main-wrapper">
    <header id="top-header"></header>
    <section id="page-content"></section>
  </main>
</div>

<div id="modal-root"></div>

<!-- LOGIN -->
<div id="login-root"></div>

<script>
// Boot progress animation
var msgs = ['Loading modules...','Setting up CRM...','Connecting to server...','Almost ready...','Ready!'];
var pcts = [20,45,70,90,100];
var fill = document.getElementById('bfill');
var bmsg = document.getElementById('bmsg');
for(var i=0;i<msgs.length;i++){
  (function(idx){
    setTimeout(function(){
      fill.style.width = pcts[idx]+'%';
      bmsg.textContent = msgs[idx];
    }, 400 + idx*600);
  })(i);
}
</script>

<script type="module" src="/src/main.js"></script>
</body>
</html>
